# Shared Services: Core Infrastructure
networks:
  homelab_global:
    name: homelab_global
    driver: bridge

services:
  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    env_file: .env
    environment:
      - TUNNEL_TOKEN=eyJhIjoiNjc5MjBiZTM1NWZlMmVmZmRkOTAxODYwOWE2YWIwNTAiLCJ0IjoiZWE3OTY5N2QtNjlhZi00ZTU5LTk5ZTItOTYwZmU2M2VlNzIyIiwicyI6Ik5qTmlZelU0TVRndFl6SmlaUzAwTVRjMExUazBZbU10TVRRME5tRXpOalZrWTJVNVlUQm1aR0ptTm1ZdE4yVTBZeTAwWlRWaUxXSXhNbVl0TlRnME1UY3laVEk1TnpoayJ9
    networks:
      - homelab_global

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro"
      - "./traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro"
      - "./traefik/acme.json:/etc/traefik/acme.json"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homelab_global
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${ACME_DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"

  # Central Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-homelab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homelab_global

  # Central Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - homelab_global

  # Temporal Orchestration Engine
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PWD=${DB_PASSWORD:-postgres}
      - POSTGRES_SEEDS=postgres
    networks:
      - homelab_global
    depends_on:
      - postgres

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    networks:
      - homelab_global
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temporal-ui.rule=Host(`temporal.${ACME_DOMAIN:-bestfam.us}`)"
      - "traefik.http.routers.temporal-ui.entrypoints=websecure"
      - "traefik.http.routers.temporal-ui.tls.certresolver=myresolver"
      - "traefik.http.services.temporal-ui.loadbalancer.server.port=8080"

volumes:
  postgres_data:
