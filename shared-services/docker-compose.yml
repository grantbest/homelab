# Shared Services: Core Infrastructure
networks:
  homelab_global:
    name: homelab_global
    driver: bridge

services:
  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file: .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - homelab_global

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik:/etc/traefik/dynamic"
      - "./letsencrypt:/letsencrypt"
    networks:
      - homelab_global

  # Shared Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    command: postgres -c max_connections=500 -c shared_buffers=256MB
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homelab_global

  # Shared Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - homelab_global

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    networks:
      - homelab_global
    depends_on:
      - postgres

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    networks:
      - homelab_global
    depends_on:
      - temporal

  # Vikunja Issue Tracker (Production)
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - VIKUNJA_DATABASE_HOST=postgres
      - VIKUNJA_DATABASE_PASSWORD=${DB_PASSWORD:-postgres}
      - VIKUNJA_DATABASE_TYPE=postgres
      - VIKUNJA_DATABASE_USER=${DB_USER:-postgres}
      - VIKUNJA_DATABASE_DATABASE=vikunja
      - VIKUNJA_SERVICE_PUBLICURL=https://tracker.bestfam.us/
      - VIKUNJA_DATABASE_MAXOPENCONNECTIONS=20
      - VIKUNJA_DATABASE_MAXIDLECONNECTIONS=10
      - VIKUNJA_CACHE_ENABLED=true
      - VIKUNJA_CACHE_TYPE=redis
      - VIKUNJA_CACHE_REDIS_URL=redis:6379
    volumes:
      - vikunja_files:/app/vikunja/files
    networks:
      - homelab_global
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vikunja.rule=Host(`tracker.bestfam.us`)"
      - "traefik.http.routers.vikunja.entrypoints=web"
      - "traefik.docker.network=homelab_global"

  # Vikunja Issue Tracker (Sandbox / Dev)
  vikunja-dev:
    image: vikunja/vikunja:latest
    container_name: vikunja-dev
    user: "0:0" # Run as root to fix permission issues on volume init
    restart: unless-stopped
    ports:
      - "3457:3456"
    environment:
      - VIKUNJA_DATABASE_HOST=postgres
      - VIKUNJA_DATABASE_PASSWORD=${DB_PASSWORD:-postgres}
      - VIKUNJA_DATABASE_TYPE=postgres
      - VIKUNJA_DATABASE_USER=${DB_USER:-postgres}
      - VIKUNJA_DATABASE_DATABASE=vikunja_dev
      - VIKUNJA_SERVICE_PUBLICURL=https://tracker-dev.bestfam.us/
      - VIKUNJA_DATABASE_MAXOPENCONNECTIONS=20
      - VIKUNJA_DATABASE_MAXIDLECONNECTIONS=10
      - VIKUNJA_CACHE_ENABLED=true
      - VIKUNJA_CACHE_TYPE=redis
      - VIKUNJA_CACHE_REDIS_URL=redis:6379
    volumes:
      - vikunja_dev_files:/app/vikunja/files
    networks:
      - homelab_global
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vikunja-dev.rule=Host(`tracker-dev.bestfam.us`)"
      - "traefik.http.routers.vikunja-dev.entrypoints=web"
      - "traefik.docker.network=homelab_global"

  # Webhook Listener (RESTORED)
  webhook-listener:
    build:
      context: ../../
      dockerfile: Homelab/Dockerfile.agents
    container_name: webhook-listener
    restart: unless-stopped
    command: ["python", "-u", "/app/Homelab/scripts/webhook_listener.py"]
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - PYTHONPATH=/app/Homelab/scripts:/app/BettingApp/scripts
    volumes:
      - /Users/grantbest/Documents/Active/Homelab:/app/Homelab
      - /Users/grantbest/Documents/Active/BettingApp:/app/BettingApp
    networks:
      - homelab_global
    ports:
      - "8000:8000"
    depends_on:
      - temporal

  # Artifact Refinery (Nexus OSS)
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    volumes:
      - nexus_data:/nexus-data
    networks:
      - homelab_global
    ports:
      - "8082:8081" # Web interface & REST API
      - "5005:5005" # Reserved for Docker Private Registry
    environment:
      - NEXUS_CONTEXT=nexus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus.rule=Host(`nexus.bestfam.us`)"
      - "traefik.http.routers.nexus.entrypoints=web"
      - "traefik.http.services.nexus.loadbalancer.server.port=8081"
      - "traefik.docker.network=homelab_global"

  # Log Forwarder (Promtail)
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - homelab_global

  # --- MONITORING & OBSERVABILITY ---
  
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      # Using standard admin user for mlb_engine as seen in psql -l
      DATA_SOURCE_NAME: "postgresql://admin:admin@postgres:5432/mlb_engine?sslmode=disable"
    networks:
      - homelab_global
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - homelab_global
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - homelab_global
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.bestfam.us`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.docker.network=homelab_global"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - homelab_global

  # --- BACKUP ---
  
  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: "mlb_engine,vikunja,temporal"
      SCHEDULE: "@daily"
      BACKUP_DIR: /backups
      KEEP_DAYS: 7
    volumes:
      - ./backups:/backups
    networks:
      - homelab_global
    depends_on:
      - postgres

volumes:
  postgres_data:
  vikunja_files:
  vikunja_dev_files:
  nexus_data:
  prometheus_data:
  grafana_data:
