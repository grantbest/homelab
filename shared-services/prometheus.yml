global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:7233'] # Check if temporal exposes metrics here

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
