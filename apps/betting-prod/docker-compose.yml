# BestFam Framework: Betting Engine (Production)
services:
  # The Betting Engine (Production Worker)
  engine:
    build:
      context: ../../../BettingApp
      dockerfile: Dockerfile
    container_name: betting-prod-engine
    restart: unless-stopped
    networks:
      - homelab_global
    env_file: .env
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mlb_engine}
      - DB_USER=${DB_USER:-admin}
      - DB_PASS=${DB_PASSWORD:-password123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # The Betting Dashboard (Production UI)
  dashboard:
    build:
      context: ../../../BettingApp/frontend
      dockerfile: Dockerfile
    container_name: betting-prod-dashboard
    restart: unless-stopped
    networks:
      - homelab_global
    env_file: .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-mlb_engine}
      - REDIS_URL=redis://redis:6379
      - PROD_URL=https://bestfam.us
      - DEV_URL=https://dev.bestfam.us
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.betting-prod.rule=Host(`bestfam.us`)"
      - "traefik.http.routers.betting-prod.entrypoints=web"
      - "traefik.http.services.betting-prod.loadbalancer.server.port=3000"
      - "traefik.docker.network=homelab_global"
      # Zero-Downtime: Traefik will wait for healthcheck pass

networks:
  homelab_global:
    external: true
